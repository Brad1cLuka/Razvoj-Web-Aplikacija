<div class="page-title">
  <h1>Contact Us</h1>
  <p>We’d love to hear from you 📩</p>
</div>

<section class="contact-container">

  <div class="contact-info">
    <h2>Get in Touch</h2>
    <p>Ask anything about our honey 🍯</p>

    <p><strong>Email:</strong> info@honey-shop.com</p>
    <p><strong>Phone:</strong> +381 60 123 456</p>
  </div>

  <form class="contact-form" (ngSubmit)="submitForm(form)" #form="ngForm">

    <input 
      type="text" 
      name="name" 
      placeholder="Your Name"
      [(ngModel)]="formData.name"
      required
      #name="ngModel"
    >
    <div class="error" *ngIf="name.invalid && name.touched">
      Name is required
    </div>

    <input 
      type="email" 
      name="email" 
      placeholder="Your Email"
      [(ngModel)]="formData.email"
      required
      email
      #email="ngModel"
    >
    <div class="error" *ngIf="email.invalid && email.touched">
      Enter a valid email
    </div>

    <textarea 
      name="message" 
      rows="5"
      placeholder="Your Message"
      [(ngModel)]="formData.message"
      required
      #message="ngModel"
    ></textarea>
    <div class="error" *ngIf="message.invalid && message.touched">
      Message is required
    </div>

    <button type="submit" [disabled]="loading || form.invalid">
      
      <span *ngIf="!loading">Send Message</span>

      <span *ngIf="loading" class="spinner"></span>

    </button>

    <p class="success" *ngIf="successMessage">
      ✅ Message sent successfully!
    </p>

  </form>

</section>
